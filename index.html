<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Final WQI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: "Inter", sans-serif; background:#f8f5f0; }
.card { background:#fff; border-radius:12px; padding:16px; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
.small-card { background:#faf7f2; padding:12px; border-radius:12px; }
.red { color:#dc2626; font-weight:600; }
</style>
</head>

<body class="p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-2xl font-bold mb-4">Water Quality Dashboard</h1>

<select id="sourceSelect" class="border p-2 rounded mb-4"></select>

<div class="small-card mb-6">
<p>WQI</p>
<p id="wqiValue" class="text-3xl font-bold"></p>
</div>

<div class="card mb-6">
<h2 class="text-lg font-semibold mb-2">Water Quality Insight</h2>
<p id="wqiInsight" class="text-sm text-gray-700"></p>
</div>

<!-- ✅ Dominant Parameter -->
<div class="card mb-6">
<h2 class="text-lg font-semibold mb-2">Dominant Parameter</h2>
<p id="dominantParam" class="text-sm text-gray-700"></p>
</div>

<div class="grid grid-cols-2 gap-6 mb-6">

<div class="card">
<h2 class="mb-2 font-semibold">WQI Comparison</h2>
<canvas id="barChart"></canvas>
</div>

<div class="card">
<h2 class="mb-2 font-semibold">Parameter Risk (QI)</h2>
<canvas id="riskChart"></canvas>
</div>

</div>

<div class="card mb-6">
<h2 class="font-semibold mb-4">Observed vs Standard</h2>
<div id="paramCharts" class="grid grid-cols-2 gap-4"></div>
</div>

<div class="card">
<table class="w-full text-sm table-fixed border-collapse">
<thead class="bg-gray-100">
<tr>
<th class="text-left px-4 py-2 w-1/4">Parameter</th>
<th class="text-center px-4 py-2 w-1/4">Observed</th>
<th class="text-center px-4 py-2 w-1/4">Standard</th>
<th class="text-center px-4 py-2 w-1/4">QI</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

const units = {
"pH":"pH","TDS":"mg/L","Nitrate":"mg/L","Ammonia":"mg/L",
"Chlorine":"mg/L","DO":"mg/L","BOD":"mg/L","Free Carbon":"mg/L",
"COD":"mg/L","Turbidity":"NTU","Total Hardness":"mg/L","Phosphate":"mg/L"
};

const allParams=[
"pH","TDS","Nitrate","Ammonia","Chlorine","DO","BOD",
"Free Carbon","COD","Turbidity","Total Hardness","Phosphate"
];

// (DATA SAME AS YOURS — not changed)
const sourcesData = {"SR 21st Floor":{wqi:26.16,data:{
"pH":{obs:8.23,std:8.5,qi:82},"TDS":{obs:659,std:500,qi:131.8},
"Nitrate":{obs:40,std:45,qi:88.88},"Ammonia":{obs:0,std:0.5,qi:0},
"Chlorine":{obs:0.05,std:0.2,qi:25},"DO":{obs:4.2,std:5,qi:108.33},
"BOD":{obs:2.6,std:3,qi:86.66},"Free Carbon":{obs:12.76,std:20,qi:63.8},
"COD":{obs:0,std:10,qi:0},"Turbidity":{obs:0,std:5,qi:0},
"Total Hardness":{obs:370,std:200,qi:185},"Phosphate":{obs:0,std:0.1,qi:0}
}},
"SR 4th Floor":{wqi:29.71,data:{
"pH":{obs:8.28,std:8.5,qi:85.33},"TDS":{obs:698,std:500,qi:139.6},
"Nitrate":{obs:40,std:45,qi:88.88},"Ammonia":{obs:0,std:0.5,qi:0},
"Chlorine":{obs:0.05,std:0.2,qi:25},"DO":{obs:4.2,std:5,qi:108.33},
"BOD":{obs:4,std:3,qi:133.33},"Free Carbon":{obs:12.76,std:20,qi:63.8},
"COD":{obs:0,std:10,qi:0},"Turbidity":{obs:0.5,std:5,qi:10},
"Total Hardness":{obs:374,std:200,qi:187},"Phosphate":{obs:0,std:0.1,qi:0}
}},
"Darshini":{wqi:28.01,data:{
"pH":{obs:8.81,std:8.5,qi:103.64},"TDS":{obs:49,std:500,qi:9.8},
"Nitrate":{obs:5,std:45,qi:11.11},"Ammonia":{obs:0,std:0.5,qi:0},
"Chlorine":{obs:0.05,std:0.2,qi:25},"DO":{obs:5,std:5,qi:100},
"BOD":{obs:4.2,std:3,qi:140},"Free Carbon":{obs:3.08,std:20,qi:15.4},
"COD":{obs:0,std:10,qi:0},"Turbidity":{obs:0,std:5,qi:0},
"Total Hardness":{obs:86,std:200,qi:43},"Phosphate":{obs:0,std:0.1,qi:0}
}},
"Lake - Big":{wqi:130.80,data:{
"pH":{obs:9.23,std:8.5,qi:148.66},"TDS":{obs:163,std:500,qi:32.6},
"Nitrate":{obs:0,std:45,qi:0},"Ammonia":{obs:0,std:0.5,qi:0},
"Chlorine":{obs:0.05,std:0.2,qi:25},"DO":{obs:8,std:5,qi:68.75},
"BOD":{obs:16,std:3,qi:533.33},"COD":{obs:159,std:20,qi:795},
"Free Carbon":{obs:0,std:10,qi:0},"Turbidity":{obs:29.2,std:5,qi:584},
"Total Hardness":{obs:0,std:200,qi:0},"Phosphate":{obs:0,std:0.1,qi:0}
}},
"Lake - Small":{wqi:92.31,data:{
"pH":{obs:8.78,std:8.5,qi:118.66},"TDS":{obs:346,std:500,qi:69.2},
"Nitrate":{obs:80,std:45,qi:177.77},"Ammonia":{obs:1,std:0.5,qi:200},
"Chlorine":{obs:0.05,std:0.2,qi:25},"DO":{obs:4.8,std:5,qi:102.08},
"BOD":{obs:6.6,std:3,qi:220},"COD":{obs:23,std:20,qi:115},
"Free Carbon":{obs:15.84,std:10,qi:158.4},"Turbidity":{obs:0.7,std:5,qi:14},
"Total Hardness":{obs:1350,std:200,qi:675},"Phosphate":{obs:0,std:0.1,qi:0}
}},
"Garden":{wqi:201.81,data:{
"pH":{obs:7.9,std:8.5,qi:92.94117647},"TDS":{obs:842,std:500,qi:168.4},
"Nitrate":{obs:5,std:45,qi:11.11},"Ammonia":{obs:0,std:0.5,qi:0},
"Chlorine":{obs:0.05,std:0.2,qi:25},"DO":{obs:5.2,std:5,qi:97.91},
"BOD":{obs:10.4,std:3,qi:346.66},"COD":{obs:54,std:20,qi:270},
"Free Carbon":{obs:31.24,std:10,qi:312.4},"Turbidity":{obs:0.5,std:5,qi:10},
"Total Hardness":{obs:384,std:200,qi:192},"Phosphate":{obs:1.15,std:0.1,qi:1150}
}},
"Surpur":{wqi:36.92,data:{
"pH":{obs:8.4,std:8.5,qi:93.33},"TDS":{obs:634,std:500,qi:126.8},
"Nitrate":{obs:40,std:45,qi:88.88},"Ammonia":{obs:0,std:0.5,qi:0},
"Chlorine":{obs:0.05,std:0.2,qi:25},"DO":{obs:6.7,std:5,qi:82.29},
"BOD":{obs:8.2,std:3,qi:273.33},"COD":{obs:24,std:20,qi:120},
"Free Carbon":{obs:17.6,std:10,qi:176},"Turbidity":{obs:0,std:5,qi:0},
"Total Hardness":{obs:372,std:200,qi:186},"Phosphate":{obs:0,std:0.1,qi:0}
}} };




const select=document.getElementById("sourceSelect");
Object.keys(sourcesData).forEach(s=>{
let o=document.createElement("option");
o.value=s;o.text=s;select.appendChild(o);
});

function getWQIColor(v){
if(v<=50) return "#22c55e";
if(v<=100) return "#facc15";
return "#ef4444";
}

new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:Object.keys(sourcesData),
datasets:[{
label:"WQI Value",
data:Object.values(sourcesData).map(s=>s.wqi),
backgroundColor:Object.values(sourcesData).map(s=>getWQIColor(s.wqi))
}]
}
});

let riskChart;

function createParamCharts(labels,obsValues,stdValues){
const container=document.getElementById("paramCharts");
container.innerHTML="";

labels.forEach((p,i)=>{
let div=document.createElement("div");
div.className="small-card";
div.innerHTML=`<p class="text-sm font-semibold mb-1">${p} (${units[p]})</p><canvas></canvas>`;
container.appendChild(div);

let canvas=div.querySelector("canvas");
let maxVal = Math.max(obsValues[i], stdValues[i]);

new Chart(canvas,{
type:"bar",
data:{
labels:["Observed","Standard"],
datasets:[
{
data:[obsValues[i],0],
backgroundColor: obsValues[i] > stdValues[i] ? "#ef4444" : "#0d9488",
barPercentage: 0.4,
categoryPercentage: 0.4,
maxBarThickness: 20
},
{
data:[0,stdValues[i]],
backgroundColor:"#eab308",
barPercentage: 0.4,
categoryPercentage: 0.4,
maxBarThickness: 20
}
]
},
options:{
plugins:{legend:{display:false}},
scales:{
y:{
beginAtZero:true,
max: Math.ceil(maxVal * 1.4 / 10) * 10
}
}
}
});
});
}

function updateDashboard(){

let src = sourcesData[select.value];
let insightEl = document.getElementById("wqiInsight");
let wqiEl = document.getElementById("wqiValue");
wqiEl.innerText = src.wqi.toFixed(2);
wqiEl.style.color = getWQIColor(src.wqi);
let labels=[],qiValues=[],obsValues=[],stdValues=[];
let body=document.getElementById("tableBody");
body.innerHTML="";

// LOOP
allParams.forEach(p=>{
let obj=src.data[p]||{obs:0,std:0,qi:0};

labels.push(p);
qiValues.push(obj.qi);
obsValues.push(obj.obs);
stdValues.push(obj.std);

body.innerHTML+=`
<tr class="border-b">
<td class="px-4 py-2">${p}</td>
<td class="px-4 py-2 text-center ${obj.obs>obj.std?'red':''}">${obj.obs} ${units[p]}</td>
<td class="px-4 py-2 text-center">${obj.std} ${units[p]}</td>
<td class="px-4 py-2 text-center">${obj.qi}</td>
</tr>`;
});

// ✅ DOMINANT PARAM
let maxQI = Math.max(...qiValues);
let index = qiValues.indexOf(maxQI);
let dominant = labels[index];

// ✅ INSIGHT
let text="";
if(src.wqi <= 50) text="Water quality is GOOD.";
else if(src.wqi <= 100) text="Water quality is MODERATE.";
else text="Water quality is POOR.";



insightEl.innerHTML = text;

// ✅ DOMINANT CARD
document.getElementById("dominantParam").innerHTML =
`<span class="red">${dominant}</span> (QI = ${maxQI.toFixed(2)})`;

// CHART
if(riskChart) riskChart.destroy();

riskChart=new Chart(document.getElementById("riskChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
data:qiValues,
backgroundColor:qiValues.map(q=> q>100?"#ef4444":q>50?"#facc15":"#22c55e")
}]
}
});

createParamCharts(labels,obsValues,stdValues);
}

select.selectedIndex=0;
select.addEventListener("change",updateDashboard);
updateDashboard();

</script>

</body>
</html>
